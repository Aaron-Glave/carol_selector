<head>
<script src="./ItemsRemaining.js"></script>
<script src="./localStorageParser.js"></script>
<!--Troubleshooting Storage Issues
Check Settings: localStorage is tied to cookie permissions; ensure cookies are not set to "Block all" in your device settings.
Private Mode Errors: Avoid crashes or silent failures by wrapping your localStorage calls in a try...catch block to handle exceptions when in Private Browsing mode.
See https://support.apple.com/guide/safari/enable-cookies-ibrw850f6c51/mac and make sure you allow cookies when you run this!-->
<script>
const start_string = "Hit the button above to begin."
const debugging = false;
const myItemsRemaining = constructNewList(), itemsPulled = constructNewList();
window.addEventListener('DOMContentLoaded', () => {
    /* If we access localStorage too early, Safari may fail to load localStorage.
       See https://fschopp.github.io/safari-local-storage-bug/ */
    setTimeout(() => {
        starting_input();
        if(debugging) {
            document.getElementById("debug_button").style.display = "inline-block";
        }
        showLocalStorage();
        document.getElementById("selectedItem").textContent = start_string;
    }, 50);
});
</script>
<script>
//Now there is a global ItemsRemaing object.
</script>
<style>
pre {
    font-family: Arial, sans-serif
}
.input {
    field-sizing: content;
    min-height: 30lh;
    min-width: 120ch;
}
</style>
</head>
<body>


<div id="setUp" style = "display: block;">
<pre id="items"></pre>
<button id="debug_button" onclick="DebugLocalStorage(myItemsRemaining)" style="display: none;">Debug Local Storage</button>
<button onclick="startGame(myItemsRemaining, itemsPulled)">Start drawing random items, 1 at a time.</button><br/>
<p style="margin-block: 0px">Enter your list of items here.</p>
<textarea class="input" id="inputItems" cols="120" rows=30
placeholder="Enter items here.&#10Multiple items are allowed."></textarea>
</div>

<div id="playGame" style = "display: none;">
<pre><button onclick="myPull(start_string, myItemsRemaining, itemsPulled)">Select an item.</button></pre>
<pre style="font-size: 125%" id="selectedItem"></pre>
<div>
<button id="btnListSoFar" onclick="showListSoFar(itemsPulled)">Show items already drawn</button>
<div id="listSoFarContainer" visibility="none">
<pre id="listSoFar"></pre>
<button onclick="hideListSoFar()">Hide list</button>
</div>
</div>
</body>
